<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Job Dependency Graph</title>
<style>
  :root {
    --bg: #f5f7fa; --panel: #ffffff; --panel-2: #eef1f5; --border: #d8dee6;
    --text: #1f2730; --muted: #687585; --accent: #1c7ed6;
    --ok: #2f9e44; --danger: #e03131; --up: #e8590c; --down: #2f9e44;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; flex-direction: column; overflow: hidden;
  }
  header {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    background: var(--panel); border-bottom: 1px solid var(--border); flex-wrap: wrap; z-index: 5;
  }
  header h1 { font-size: 15px; margin: 0 8px 0 0; font-weight: 600; }
  .crumb { font-size: 12px; color: var(--muted); } .crumb b { color: var(--text); }
  .search-wrap { position: relative; }
  #search {
    background: #fff; border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 7px 30px 7px 12px; width: 220px; outline: none; font-size: 13px;
  }
  #search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(28,126,214,.12); }
  #searchCount { position: absolute; right: 9px; top: 50%; transform: translateY(-50%); font-size: 11px; color: var(--muted); }
  button {
    background: #fff; color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 12px; cursor: pointer; font-size: 13px; white-space: nowrap;
    transition: background .12s, border-color .12s;
  }
  button:hover { background: var(--panel-2); border-color: #c2cad3; }
  button:active { transform: translateY(1px); }
  .sep { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }
  .spacer { flex: 1; }
  .stats { color: var(--muted); font-size: 12px; display: flex; gap: 14px; }
  .stats b { color: var(--text); font-weight: 600; }
  .stats .good { color: var(--ok); } .stats .bad { color: var(--danger); }

  .body { flex: 1; display: flex; min-height: 0; }
  #cy { flex: 1; position: relative; min-width: 0; background: var(--bg); }

  #panel {
    width: 330px; flex: none; background: var(--panel); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  #panel .p-head { padding: 14px 16px 12px; border-bottom: 1px solid var(--border); }
  #panel .p-title { font-size: 16px; font-weight: 600; word-break: break-word; }
  #panel .p-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
  #panel .p-body { padding: 12px 16px; overflow-y: auto; flex: 1; }
  .kv { display: flex; justify-content: space-between; gap: 10px; font-size: 12.5px; padding: 5px 0; border-bottom: 1px solid #eef1f5; }
  .kv .k { color: var(--muted); } .kv .v { color: var(--text); text-align: right; word-break: break-word; }
  .sec-title { font-size: 11px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin: 16px 0 6px; display: flex; align-items: center; gap: 6px; }
  .sec-title .arrow { font-weight: 700; } .sec-title.up .arrow { color: var(--up); } .sec-title.down .arrow { color: var(--down); }
  .count-pill { background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px; padding: 0 7px; font-size: 11px; color: var(--text); }
  .chain-note { font-size: 11.5px; color: var(--muted); margin: 2px 0 0; }
  .dep-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 7px; cursor: pointer; font-size: 12.5px; transition: background .1s; }
  .dep-item:hover { background: var(--panel-2); }
  .dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
  .box-dot { width: 11px; height: 11px; border-radius: 3px; flex: none; }
  .dep-item .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .empty { color: var(--muted); font-size: 12px; padding: 4px 0; }
  .placeholder { color: var(--muted); font-size: 13px; line-height: 1.7; }
  .placeholder kbd { background: var(--panel-2); border: 1px solid var(--border); border-radius: 4px; padding: 0 5px; font-size: 11px; }
  .legend-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; font-size: 12.5px; cursor: pointer; padding: 3px 6px; border-radius: 6px; }
  .legend-row:hover { background: var(--panel-2); }
  .swatch { width: 12px; height: 12px; border-radius: 3px; flex: none; }
</style>
</head>
<body>
  <header>
    <h1>Job Dependency Graph</h1>
    <span class="crumb" id="crumb">all boxes collapsed</span>
    <div class="sep"></div>
    <div class="search-wrap">
      <input id="search" type="text" placeholder="Search jobs… (/)" autocomplete="off" />
      <span id="searchCount"></span>
    </div>
    <button id="expandAll">Expand all</button>
    <button id="collapseAll">Collapse all</button>
    <button id="fit">Fit</button>
    <button id="dir">↓ TB</button>
    <div class="spacer"></div>
    <div class="stats">
      <span><b id="nJobs">0</b> jobs</span>
      <span><b id="nBoxes">0</b> boxes</span>
      <span><b id="nEdges">0</b> deps</span>
      <span id="health"></span>
    </div>
  </header>

  <div class="body">
    <div id="cy"></div>
    <aside id="panel">
      <div class="p-head">
        <div class="p-title" id="pTitle">Overview</div>
        <div class="p-sub" id="pSub">Click a box to expand its linked boxes</div>
      </div>
      <div class="p-body" id="pBody"></div>
    </aside>
  </div>

  <!-- graph structure (separate, diff-friendly resource) -->
  <script src="graph-data.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
<script>
const DATA = window.GRAPH_DATA;

/* ---- validation ---- */
function validate(data){
  const ids=new Set(data.jobs.map(j=>j.id)); const p={missing:[],cycles:0,orphans:0};
  for (const j of data.jobs) for (const d of j.depends_on) if(!ids.has(d)) p.missing.push(`${j.id} -> ${d}`);
  const color={}, adj={}; data.jobs.forEach(j=>adj[j.id]=j.depends_on.filter(d=>ids.has(d)));
  let cyc=false; (function(){ function dfs(n){ color[n]=1; for(const m of adj[n]||[]){ if(color[m]===1){cyc=true;return;} if(!color[m]) dfs(m);} color[n]=2; }
    for(const j of data.jobs) if(!color[j.id]) dfs(j.id); })();
  p.cycles=cyc?1:0;
  const inc=new Set(); data.jobs.forEach(j=>j.depends_on.forEach(d=>inc.add(d)));
  p.orphans=data.jobs.filter(j=>!j.depends_on.length && !inc.has(j.id)).length;
  return p;
}

/* ---- precompute ---- */
const DOMAIN_COLORS = { data_platform:'#1c7ed6', analytics:'#7048e8', ml:'#2f9e44', reporting:'#e8590c' };
const FALLBACK = ['#1c7ed6','#7048e8','#2f9e44','#e8590c','#1098ad','#d6336c','#f08c00','#5f3dc4'];
const problems = validate(DATA);
const jobById = Object.fromEntries(DATA.jobs.map(j=>[j.id,j]));
const groupById = Object.fromEntries(DATA.groups.map(g=>[g.id,g]));
const groupDomain = {}; DATA.groups.forEach(g=>{ if(g.parent) groupDomain[g.id]=g.parent; });
const domainBoxes = DATA.groups.filter(g=>!g.parent);
const innerBoxes  = DATA.groups.filter(g=>g.parent);
const innerIds = innerBoxes.map(g=>g.id);
const innerSet = new Set(innerIds);
domainBoxes.forEach((d,i)=>{ if(!DOMAIN_COLORS[d.id]) DOMAIN_COLORS[d.id]=FALLBACK[i%FALLBACK.length]; });
const domColor = id => DOMAIN_COLORS[id] || '#868e96';

const upAdj={}, downAdj={};
DATA.jobs.forEach(j=>{ upAdj[j.id]=j.depends_on.slice(); if(!downAdj[j.id])downAdj[j.id]=[];
  j.depends_on.forEach(d=>{ (downAdj[d]=downAdj[d]||[]).push(j.id); }); });
const groupAdj={}; innerIds.forEach(g=>groupAdj[g]=new Set());
const jobRelGroups={}; DATA.jobs.forEach(j=>jobRelGroups[j.id]=new Set([j.group]));
DATA.jobs.forEach(j=>{ j.depends_on.forEach(dep=>{
  const a=jobById[dep]?.group, b=j.group;
  if(a&&b&&a!==b){ groupAdj[a].add(b); groupAdj[b].add(a); }
  jobRelGroups[j.id].add(a); if(jobRelGroups[dep]) jobRelGroups[dep].add(b);
}); });
const jobsByGroup={}; innerIds.forEach(g=>jobsByGroup[g]=[]); DATA.jobs.forEach(j=>jobsByGroup[j.group]?.push(j.id));
function chainSize(id,adj){ const seen=new Set(); let q=[id]; while(q.length){const n=q.shift(); for(const m of (adj[n]||[])) if(!seen.has(m)){seen.add(m);q.push(m);} } return seen.size; }

document.getElementById('nJobs').textContent = DATA.jobs.length;
document.getElementById('nBoxes').textContent = DATA.groups.length;
document.getElementById('nEdges').textContent = DATA.jobs.reduce((s,j)=>s+j.depends_on.length,0);
document.getElementById('health').innerHTML = (problems.missing.length+problems.cycles)
  ? `<span class="bad">⚠ ${problems.cycles?'cycle ':''}${problems.missing.length} missing</span>`
  : `<span class="good">✓ valid DAG</span>`;

/* ============================================================
   VIEW MODEL — expandedGroups drives a filtered subgraph.
   Collapsed box => one chip; expanded box => its jobs inside a
   compound box. Edges re-point to whatever is visible.
   ============================================================ */
let expandedGroups = new Set();
let rankDir = 'TB';
const visId = jobId => { const g=jobById[jobId].group; return expandedGroups.has(g) ? jobId : `box:${g}`; };

function buildElements(){
  const els=[]; const usedDomains=new Set();
  for (const g of innerBoxes){
    usedDomains.add(g.parent);
    if (expandedGroups.has(g.id)){
      els.push({ data:{ id:g.id, parent:g.parent, label:g.name, kind:'group', domain:g.parent } });
      for (const jid of jobsByGroup[g.id]){
        const j=jobById[jid];
        els.push({ data:{ id:jid, parent:g.id, label:j.name, kind:'job', domain:g.parent } });
      }
    } else {
      els.push({ data:{ id:`box:${g.id}`, parent:g.parent, label:`${g.name}  ·  ${jobsByGroup[g.id].length}`,
        kind:'box', group:g.id, domain:g.parent } });
    }
  }
  for (const d of domainBoxes) if (usedDomains.has(d.id))
    els.push({ data:{ id:d.id, label:d.name, kind:'domain', domain:d.id } });

  const seen=new Set();
  for (const j of DATA.jobs) for (const dep of j.depends_on){
    const s=visId(dep), t=visId(j.id);
    if (s===t) continue;
    const key=`${s}>>${t}`;
    if (!seen.has(key)){ seen.add(key); els.push({ data:{ id:key, source:s, target:t } }); }
  }
  return els;
}

/* ============================================================
   CYTOSCAPE
   ============================================================ */
const cy = cytoscape({
  container: document.getElementById('cy'),
  elements: buildElements(),
  wheelSensitivity: 0.2,
  minZoom: 0.05, maxZoom: 3,
  style: [
    { selector:'node[kind="job"]', style:{
        'background-color': e=>domColor(e.data('domain')), 'border-width':1, 'border-color':'#fff',
        'width':15,'height':15,'label':'data(label)','font-size':8,'color':'#3a4450',
        'text-valign':'center','text-halign':'right','text-margin-x':3,'text-max-width':90 } },
    { selector:'node[kind="box"]', style:{
        'shape':'round-rectangle','background-color': e=>domColor(e.data('domain')),'background-opacity':0.16,
        'border-width':1.5,'border-color': e=>domColor(e.data('domain')),
        'label':'data(label)','font-size':11.5,'font-weight':600,'color':'#33404d',
        'text-valign':'center','text-halign':'center','text-max-width':150,
        'width':160,'height':42,'padding':6 } },
    { selector:'node[kind="group"]', style:{
        'shape':'round-rectangle','background-color': e=>domColor(e.data('domain')),'background-opacity':0.09,
        'border-width':1,'border-color': e=>domColor(e.data('domain')),'border-opacity':0.5,
        'label':'data(label)','font-size':11,'font-weight':600,'color':'#495260',
        'text-valign':'top','text-halign':'center','text-margin-y':3,'padding':12 } },
    { selector:'node[kind="domain"]', style:{
        'shape':'round-rectangle','background-color': e=>domColor(e.data('domain')),'background-opacity':0.04,
        'border-width':1.5,'border-color': e=>domColor(e.data('domain')),'border-opacity':0.5,'border-style':'dashed',
        'label':'data(label)','font-size':14,'font-weight':700,'color':'#33404d',
        'text-valign':'top','text-halign':'center','text-margin-y':4,'padding':22 } },
    { selector:'edge', style:{
        'width':0.9,'line-color':'#b8c0cb','target-arrow-color':'#b8c0cb','target-arrow-shape':'triangle',
        'arrow-scale':0.8,'curve-style':'bezier','opacity':0.75 } },
    { selector:'node.sel', style:{ 'border-width':3,'border-color':'#1f2730','font-weight':700,'color':'#000','z-index':60 } },
    { selector:'node.up',  style:{ 'border-width':3,'border-color':'#e8590c','color':'#b34700','font-weight':600,'z-index':50 } },
    { selector:'node.down',style:{ 'border-width':3,'border-color':'#2f9e44','color':'#1d6e2f','font-weight':600,'z-index':50 } },
    { selector:'node.match',style:{ 'border-width':3,'border-color':'#1c7ed6','z-index':50 } },
    { selector:'edge.up',  style:{ 'line-color':'#e8590c','target-arrow-color':'#e8590c','width':2,'opacity':1,'z-index':50 } },
    { selector:'edge.down',style:{ 'line-color':'#2f9e44','target-arrow-color':'#2f9e44','width':2,'opacity':1,'z-index':50 } },
  ],
});

/* ---- hierarchical layout: each box laid out as its own dependency
   tree (dagre), then boxes arranged as a tree, then domains. Positions
   are applied via Cytoscape `preset` so boxes stay tidy, not scattered. ---- */
const CHIP = { w:172, h:48 };
const visUnit = jobId => { const g=jobById[jobId].group; return expandedGroups.has(g) ? g : `box:${g}`; };

function runDagre(cfg, nodes, edges, compound){
  const G=new dagre.graphlib.Graph({compound:!!compound});
  G.setGraph(cfg); G.setDefaultEdgeLabel(()=>({}));
  nodes.forEach(n=>G.setNode(n.id,{ width:n.w, height:n.h }));
  if (compound) nodes.forEach(n=>{ if(n.parent){ if(!G.hasNode(n.parent)) G.setNode(n.parent,{}); G.setParent(n.id,n.parent); } });
  edges.forEach(([a,b])=>{ if(G.hasNode(a)&&G.hasNode(b)&&a!==b) G.setEdge(a,b); });
  dagre.layout(G);
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity; const pos={};
  nodes.forEach(n=>{ const g=G.node(n.id); pos[n.id]={x:g.x,y:g.y};
    minX=Math.min(minX,g.x-n.w/2); minY=Math.min(minY,g.y-n.h/2);
    maxX=Math.max(maxX,g.x+n.w/2); maxY=Math.max(maxY,g.y+n.h/2); });
  return { pos, minX, minY, w:maxX-minX, h:maxY-minY };
}

function computePositions(){
  const rd = rankDir; // 'TB' | 'LR'
  const inner={}, boxSize={}, PADX=20, PADTOP=30, PADBOT=16;
  for (const g of expandedGroups){
    const ids=jobsByGroup[g];
    const edges=[]; for(const id of ids) for(const dep of upAdj[id]) if(jobById[dep] && jobById[dep].group===g) edges.push([dep,id]);
    const r=runDagre({rankdir:rd,nodesep:16,ranksep:34,marginx:6,marginy:6}, ids.map(id=>({id,w:110,h:22})), edges, false);
    const rel={}; ids.forEach(id=>{ rel[id]={ x:r.pos[id].x-r.minX, y:r.pos[id].y-r.minY }; });
    inner[g]=rel; boxSize[g]={ w:r.w+PADX*2, h:r.h+PADTOP+PADBOT };
  }
  // outer: box units (compound = domain), arranged by box-to-box deps
  const units=[], present=new Set();
  for (const g of innerBoxes){
    present.add(g.parent);
    if (expandedGroups.has(g.id)) units.push({ id:g.id, w:boxSize[g.id].w, h:boxSize[g.id].h, parent:g.parent });
    else units.push({ id:`box:${g.id}`, w:CHIP.w, h:CHIP.h, parent:g.parent });
  }
  const oedges=[]; const seen=new Set();
  for (const j of DATA.jobs) for (const dep of j.depends_on){
    const s=visUnit(dep), t=visUnit(j.id); if(s===t) continue;
    const k=s+'>'+t; if(!seen.has(k)){ seen.add(k); oedges.push([s,t]); }
  }
  const outer=runDagre({rankdir:rd,nodesep:48,ranksep:80,marginx:20,marginy:20,ranker:'tight-tree'}, units, oedges, true);

  const positions={};
  for (const g of innerBoxes){
    if (expandedGroups.has(g.id)){
      const c=outer.pos[g.id]; const tlx=c.x-boxSize[g.id].w/2, tly=c.y-boxSize[g.id].h/2;
      const bx=tlx+PADX, by=tly+PADTOP;
      for (const id of jobsByGroup[g.id]){ const r=inner[g.id][id]; positions[id]={ x:bx+r.x, y:by+r.y }; }
    } else {
      const c=outer.pos[`box:${g.id}`]; positions[`box:${g.id}`]={ x:c.x, y:c.y };
    }
  }
  return positions;
}
function relayout(){
  const pos=computePositions();
  cy.layout({ name:'preset', positions:n=>pos[n.id()], fit:true, padding:30, animate:false }).run();
}

/* ---- rebuild current view ---- */
function rebuild(){
  cy.startBatch(); cy.elements().remove(); cy.add(buildElements()); cy.endBatch();
  relayout(); updateCrumb();
}
function updateCrumb(){
  const n=expandedGroups.size;
  document.getElementById('crumb').innerHTML = n===0 ? 'all boxes collapsed'
    : n===1 ? `box: <b>${groupById[[...expandedGroups][0]].name}</b>`
    : n===innerIds.length ? '<b>all boxes</b> expanded'
    : `<b>${n}</b> of ${innerIds.length} boxes expanded`;
}
function clearHi(){ cy.elements().removeClass('sel up down match'); }

/* ---- panel ---- */
const pTitle=document.getElementById('pTitle'), pSub=document.getElementById('pSub'), pBody=document.getElementById('pBody');
const kv=(k,v)=>`<div class="kv"><span class="k">${k}</span><span class="v">${v}</span></div>`;
const jobColor = id => domColor(groupDomain[jobById[id]?.group]);
function depRow(id){ const j=jobById[id]; if(!j) return ''; return `<div class="dep-item" data-id="${id}"><span class="dot" style="background:${jobColor(id)}"></span><span class="nm" title="${id}">${j.name}</span></div>`; }
function boxRow(gid){ const g=groupById[gid]; return `<div class="dep-item" data-gid="${gid}"><span class="box-dot" style="background:${domColor(groupDomain[gid])}"></span><span class="nm">${g.name}</span></div>`; }

function showOverview(){
  pTitle.textContent='Overview'; pSub.textContent=`${DATA.jobs.length} jobs · ${DATA.groups.length} boxes`;
  let html='<div class="sec-title">Top-level boxes</div>';
  for (const d of domainBoxes) html+=`<div class="legend-row" data-gid="${d.id}"><span class="swatch" style="background:${domColor(d.id)}"></span>${d.name}</div>`;
  html+=`<div class="sec-title">How to navigate</div><div class="placeholder">
    Everything starts collapsed into boxes.<br>
    • <b>Click a box</b> → it expands with the boxes it links to; the rest stay collapsed and the view fits.<br>
    • <b>Click a job</b> → expands its dependencies' boxes; <span style="color:var(--up)">■</span> upstream / <span style="color:var(--down)">■</span> downstream highlight.<br>
    • Walk the chain via the lists below.<br>
    • <kbd>/</kbd> search · <kbd>Esc</kbd> reset</div>`;
  pBody.innerHTML=html;
}
function showGroup(gid){
  const g=groupById[gid], linked=[...groupAdj[gid]].sort();
  pTitle.textContent=g.name; pSub.textContent=`Box · ${jobsByGroup[gid].length} jobs`;
  let html=kv('In', groupById[g.parent]?.name||'—')+kv('Jobs', jobsByGroup[gid].length);
  html+=`<div class="sec-title">Linked boxes <span class="count-pill">${linked.length}</span></div>`;
  html+= linked.length ? linked.map(boxRow).join('') : '<div class="empty">No cross-box dependencies</div>';
  pBody.innerHTML=html;
}
function showNode(id){
  const j=jobById[id]; if(!j) return;
  pTitle.textContent=j.name; pSub.textContent=`${groupById[j.group]?.name} · ${id}`;
  const up=(upAdj[id]||[]).slice().sort(), down=(downAdj[id]||[]).slice().sort();
  let html=kv('Box', groupById[j.group]?.name)+kv('Owner', j.meta?.owner||'—')+kv('Schedule', j.meta?.schedule||'—');
  html+=`<div class="sec-title up"><span class="arrow">▲</span> Depends on <span class="count-pill">${up.length}</span></div>`;
  html+= up.length ? up.map(depRow).join('') : '<div class="empty">No upstream dependencies (root job)</div>';
  const ut=chainSize(id,upAdj); if(ut>up.length) html+=`<div class="chain-note">${ut} jobs upstream in total</div>`;
  html+=`<div class="sec-title down"><span class="arrow">▼</span> Required by <span class="count-pill">${down.length}</span></div>`;
  html+= down.length ? down.map(depRow).join('') : '<div class="empty">Nothing depends on this (leaf job)</div>';
  const dt=chainSize(id,downAdj); if(dt>down.length) html+=`<div class="chain-note">${dt} jobs downstream in total</div>`;
  pBody.innerHTML=html;
}

/* ---- focus actions ---- */
function focusGroup(gid){
  // one box at a time: expand only this box; its linked boxes stay as chips
  expandedGroups = new Set([gid]);
  rebuild(); clearHi();
  [...groupAdj[gid]].forEach(n=>cy.getElementById(`box:${n}`).addClass('match')); // show what it links to
  showGroup(gid);
}
function focusJob(id){
  // expand only the job's own box; dependencies in other boxes show as highlighted chips
  expandedGroups = new Set([jobById[id].group]);
  rebuild(); clearHi();
  cy.getElementById(id).addClass('sel');
  (upAdj[id]||[]).forEach(d=>{ const v=visId(d); cy.getElementById(v).addClass('up'); cy.getElementById(`${v}>>${id}`).addClass('up'); });
  (downAdj[id]||[]).forEach(d=>{ const v=visId(d); cy.getElementById(v).addClass('down'); cy.getElementById(`${id}>>${v}`).addClass('down'); });
  showNode(id);
}
function handleClick(id){
  if(!id) return;
  if(id.startsWith('box:')) focusGroup(id.slice(4));
  else if(jobById[id]) focusJob(id);
  else if(innerSet.has(id)) focusGroup(id);
}
cy.on('tap','node', evt=>handleClick(evt.target.id()));
cy.on('tap', evt=>{ if(evt.target===cy){ clearHi(); showOverview(); } });
pBody.addEventListener('click', e=>{ const it=e.target.closest('[data-id],[data-gid]'); if(!it) return; if(it.dataset.id) focusJob(it.dataset.id); else if(it.dataset.gid) focusGroup(it.dataset.gid); });

/* ---- search ---- */
const search=document.getElementById('search'), searchCount=document.getElementById('searchCount');
function runSearch(){
  const q=search.value.trim().toLowerCase();
  if(!q){ searchCount.textContent=''; expandedGroups=new Set(); rebuild(); clearHi(); showOverview(); return; }
  const matches=DATA.jobs.filter(j=>j.name.toLowerCase().includes(q)||j.id.toLowerCase().includes(q));
  searchCount.textContent=String(matches.length);
  expandedGroups=new Set(matches.map(j=>j.group));
  rebuild(); clearHi();
  matches.forEach(j=>cy.getElementById(j.id).addClass('match'));
}
let st; search.addEventListener('input',()=>{ clearTimeout(st); st=setTimeout(runSearch,200); });

/* ---- toolbar ---- */
function collapseAll(){ expandedGroups=new Set(); rebuild(); clearHi(); showOverview(); }
function expandAll(){ expandedGroups=new Set(innerIds); rebuild(); clearHi(); }
document.getElementById('fit').onclick=()=>cy.fit(undefined,30);
document.getElementById('collapseAll').onclick=collapseAll;
document.getElementById('expandAll').onclick=expandAll;
document.getElementById('dir').onclick=e=>{ rankDir = rankDir==='TB'?'LR':'TB'; e.target.textContent = rankDir==='TB'?'↓ TB':'→ LR'; relayout(); };
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){ search.value=''; searchCount.textContent=''; collapseAll(); search.blur(); }
  if(e.key==='/' && document.activeElement!==search){ e.preventDefault(); search.focus(); }
});

/* ---- init ---- */
relayout(); updateCrumb(); showOverview();
</script>
</body>
</html>
